name: pip install

on:
  pull_request:
    branches:
      - "master"
  push:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  pip-install:
    runs-on: [ self-hosted, linux, x64 ]
    strategy:
      fail-fast: true
      matrix:
        ubuntu: ["22.04", "24.04"]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    container:
      image: omavteam/ubuntu-omav:${{ matrix.ubuntu }}
      credentials:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    name: Ubuntu ${{ matrix.ubuntu }} | Python ${{ matrix.python-version }} | pip install
    steps:
      - name: Checkout lpp
        uses: actions/checkout@v4

      - name: Install curl
        run: apt update && apt install -y curl

      - name: Install micromamba
        shell: bash
        run: |
          curl -L micro.mamba.pm/install.sh | bash

      - name: Install Python and package
        shell: bash
        run: |
          source ~/.bashrc
          micromamba env create -n lpptest
          micromamba activate lpptest
          micromamba install -y python==${{ matrix.python-version }} -c conda-forge
          pip install -v .