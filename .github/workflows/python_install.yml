name: uv install

on:
  pull_request:
    branches:
      - "master"
  push:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  pip-install:
    runs-on: [ self-hosted, linux, x64 ]
    strategy:
      fail-fast: true
      matrix:
        ubuntu: ["22.04", "24.04"]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    container:
      image: omavteam/ubuntu-omav:${{ matrix.ubuntu }}
      credentials:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    name: Ubuntu ${{ matrix.ubuntu }} | Python ${{ matrix.python-version }} | pip install
    steps:
      - name: Checkout lpp
        uses: actions/checkout@v6

      - name: Install lpp
        run: | 
          source ~/.bashrc
          uv sync
        shell: bash